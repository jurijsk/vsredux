name: Publish

# Publish to npm when a version tag (v*) is pushed (created by `npm run release`).
# Wired for Trusted Publishing via OIDC; the `id-token: write` permission below is
# what authenticates. See RELEASING.md for the release flow, the npm-auth options
# (OIDC vs. token), and the manual fallback.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - run: vp install
      - run: vp check
      - run: vp test

      # Trusted publishing requires npm >= 11.5.1 (Node >= 22.14, which the Vite+
      # toolchain provides). Upgrade npm to be safe regardless of the bundled version.
      - run: npm install -g npm@latest

      # prepublishOnly rebuilds dist/. No token: npm uses the OIDC id-token.
      - run: npm publish --access public
